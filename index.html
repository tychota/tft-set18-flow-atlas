<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="TFT Set 18 Flow Atlas with exact trait tiers, tooltips, items, starters, transitions, reroll, Fast 8 and Fast 9 lines.">
  <title>TFT Set 18 Flow Atlas</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background: #091018; color: #edf3f8; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; }
    main { max-width: 34rem; padding: 2rem; text-align: center; }
    p { color: #aab8c4; }
  </style>
</head>
<body>
  <main><h1>TFT Set 18 Flow Atlas</h1><p>Loading the latest verified atlas…</p></main>
  <script src="release/v2/chunk-00.js"></script>
  <script src="release/v2/chunk-01.js"></script>
  <script src="release/v2/chunk-02.js"></script>
  <script src="release/v2/chunk-03.js"></script>
  <script src="release/v2/chunk-04-05.js"></script>
  <script src="release/v2/chunk-06-07.js"></script>
  <script src="release/v2/chunk-08-09.js"></script>
  <script src="release/v2/chunk-10-11.js"></script>
  <script src="release/v2/patch-2026-07-15.js"></script>
  <script>
    (async () => {
      const encoded = (window.__atlasChunks || []).join('');
      if (!encoded) throw new Error('Atlas payload is missing.');
      const bytes = Uint8Array.from(atob(encoded), character => character.charCodeAt(0));
      const decompressed = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      let html = await new Response(decompressed).text();
      if (window.__patchAtlasHtml) html = window.__patchAtlasHtml(html);
      document.open();
      document.write(html);
      document.close();
    })().catch(error => {
      document.body.innerHTML = `<main><h1>Unable to load atlas</h1><p>${String(error)}</p></main>`;
    });
  </script>
</body>
</html>
